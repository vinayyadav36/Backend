version: '3.8'

services:
  # ── Databases ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jarvis_accounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Legacy Express API (hotel management) ─────────────────────────────────
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/hotel_management
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-agent:8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── NestJS API Gateway (Jarvis) ───────────────────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway-nest
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: jarvis_accounting
      MONGO_URI: mongodb://mongodb:27017/jarvis
      ML_AGENT_URL: http://ml-agent:8000
      WORKER_URL: http://worker-service:4000
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  # ── FastAPI ML Agent ──────────────────────────────────────────────────────
  ml-agent:
    build:
      context: ./apps/ml-agent-fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/jarvis
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  # ── Temporal Worker ───────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${DB_PASSWORD:-password}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

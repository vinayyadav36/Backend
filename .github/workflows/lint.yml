name: Lint

on: [push, pull_request]

jobs:
  lint-express:
    name: Express — Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  lint-nest:
    name: NestJS Gateway — Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api-gateway-nest/package-lock.json

      - name: Install dependencies
        working-directory: apps/api-gateway-nest
        run: npm ci

      - name: Lint
        working-directory: apps/api-gateway-nest
        run: npm run lint --if-present

  lint-ml:
    name: ML Agent — Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint (flake8)
        working-directory: apps/ml-agent-fastapi
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__,generated --ignore=E501,W503

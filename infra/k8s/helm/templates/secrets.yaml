{{- /*
  backend-secrets — referenced by all three deployments via envFrom.secretRef.
  In production, inject real values via:
    helm upgrade --set secrets.dbPassword=... --set secrets.jwtSecret=...
  or use an ExternalSecret / Azure Key Vault CSI driver in place of this template.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  NODE_ENV: "production"
  DB_HOST: {{ .Values.secrets.dbHost | default "postgres" | quote }}
  DB_PORT: {{ .Values.secrets.dbPort | default "5432" | quote }}
  DB_USER: {{ .Values.secrets.dbUser | default "postgres" | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  DB_NAME: {{ .Values.secrets.dbName | default "jarvis_accounting" | quote }}
  MONGO_URI: {{ .Values.secrets.mongoUri | default "mongodb://mongodb:27017/jarvis" | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  JWT_EXPIRE: {{ .Values.secrets.jwtExpire | default "7d" | quote }}
  JWT_REFRESH_SECRET: {{ required "secrets.jwtRefreshSecret is required" .Values.secrets.jwtRefreshSecret | quote }}
  JWT_REFRESH_EXPIRE: {{ .Values.secrets.jwtRefreshExpire | default "30d" | quote }}
  ML_AGENT_URL: {{ .Values.secrets.mlAgentUrl | default "http://ml-agent:8000" | quote }}
  TEMPORAL_ADDRESS: {{ .Values.secrets.temporalAddress | default "temporal:7233" | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | default "redis://redis:6379" | quote }}
  LOG_LEVEL: {{ .Values.secrets.logLevel | default "info" | quote }}

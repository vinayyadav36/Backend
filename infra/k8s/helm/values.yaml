replicaCount: 2

image:
  repository: myregistry.azurecr.io
  tag: latest
  pullPolicy: Always

# Secret values — override at deploy time via:
#   helm upgrade --set secrets.dbPassword=... --set secrets.jwtSecret=... --set secrets.jwtRefreshSecret=...
# or supply a values file that is NOT committed to the repository.
secrets:
  dbHost: "postgres"
  dbPort: "5432"
  dbUser: "postgres"
  dbPassword: ""           # REQUIRED — set via --set or a private values file
  dbName: "jarvis_accounting"
  mongoUri: "mongodb://mongodb:27017/jarvis"
  jwtSecret: ""            # REQUIRED — set via --set or a private values file
  jwtExpire: "7d"
  jwtRefreshSecret: ""     # REQUIRED — set via --set or a private values file
  jwtRefreshExpire: "30d"
  mlAgentUrl: "http://ml-agent:8000"
  temporalAddress: "temporal:7233"
  redisUrl: "redis://redis:6379"
  logLevel: "info"

apiGateway:
  name: api-gateway
  port: 3000
  priorityClassName: jarvis-critical

mlAgent:
  name: ml-agent
  port: 8000
  grpcPort: 50051
  priorityClassName: jarvis-high

worker:
  name: worker-service
  port: 4000
  priorityClassName: jarvis-high

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Internal load balancer — no public IP on AKS nodes
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    # cert-manager auto-renews TLS — no manual certificate management
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.jarvis.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: jarvis-tls
      hosts:
        - api.jarvis.example.com

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Pod Disruption Budget (rendered in templates/pdb.yaml)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# gRPC Neural Link
grpc:
  enabled: true
  port: 50051
  tls:
    enabled: false   # set true in production with cert paths
    certSecretName: grpc-tls-secret


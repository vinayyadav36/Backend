name: Build · Test · Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jarvis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install NestJS Gateway dependencies
        working-directory: apps/api-gateway-nest
        run: npm ci

      - name: Lint — Express app
        continue-on-error: true
        run: npm run lint --if-present

      - name: Lint — NestJS Gateway
        working-directory: apps/api-gateway-nest
        continue-on-error: true
        run: npm run lint --if-present

      - name: Test — Express app
        run: npm run test:ci
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci

      - name: Upload Express test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: express-junit-report
          path: reports/junit/junit.xml
          if-no-files-found: warn

      - name: Test — NestJS Gateway
        working-directory: apps/api-gateway-nest
        run: npm test --if-present -- --passWithNoTests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: jarvis_test

      - name: Build — Express API Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }} \
            .

      - name: Build — NestJS Gateway Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }} \
            ./apps/api-gateway-nest

      - name: Build — ML Agent Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ml-agent:${{ github.sha }} \
            ./apps/ml-agent-fastapi

      - name: Build — Worker Service Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/worker-service:${{ github.sha }} \
            ./apps/worker-service

      - name: Login to Azure
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push images to ACR
        if: github.ref == 'refs/heads/main'
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ml-agent:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/worker-service:${{ github.sha }}

      - name: Set AKS context
        if: github.ref == 'refs/heads/main'
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Helm
        if: github.ref == 'refs/heads/main'
        run: |
          helm upgrade --install backend-suite ./infra/k8s/helm \
            --namespace backend \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }} \
            --set secrets.dbPassword=${{ secrets.DB_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set secrets.jwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
            --wait --timeout 5m

name: Build · Test · Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Express API — lint + test (runs in parallel with jobs 2 & 3) ──────
  test-express:
    name: Express — Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: express-junit-report
          path: reports/junit/junit.xml
          if-no-files-found: warn

  # ── Job 2: NestJS Gateway — lint + test (runs in parallel) ──────────────────
  test-nest:
    name: NestJS Gateway — Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jarvis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api-gateway-nest/package-lock.json

      - name: Install dependencies
        working-directory: apps/api-gateway-nest
        run: npm ci

      - name: Lint
        working-directory: apps/api-gateway-nest
        run: npm run lint --if-present

      - name: Test
        working-directory: apps/api-gateway-nest
        run: npm test --if-present -- --passWithNoTests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: jarvis_test

  # ── Job 3: ML FastAPI — lint (runs in parallel) ──────────────────────────────
  lint-ml:
    name: ML Agent — Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint (flake8)
        working-directory: apps/ml-agent-fastapi
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__,generated --ignore=E501,W503

  # ── Job 4: Build Docker images & deploy (only on main, after all tests pass) ─
  build-deploy:
    name: Build & Deploy
    needs: [test-express, test-nest, lint-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build — Express API
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }} \
            .

      - name: Build — NestJS Gateway
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }} \
            ./apps/api-gateway-nest

      - name: Build — ML Agent
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ml-agent:${{ github.sha }} \
            ./apps/ml-agent-fastapi

      - name: Build — Worker Service
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/worker-service:${{ github.sha }} \
            ./apps/worker-service

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push images to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ml-agent:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/worker-service:${{ github.sha }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Helm
        run: |
          helm upgrade --install backend-suite ./infra/k8s/helm \
            --namespace backend \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }} \
            --set secrets.dbPassword=${{ secrets.DB_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set secrets.jwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
            --wait --timeout 5m
